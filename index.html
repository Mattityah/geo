<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halftone Dots</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede8; --panel: #e8e4de; --border: #ccc8c0;
    --text: #1a1a1a; --text-muted: #666;
    --font: 'Courier New', Courier, monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 280px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header a { font-size: 11px; text-decoration: none; color: var(--text-muted); }
  .sidebar-header h1 { font-size: 13px; font-weight: normal; margin-top: 4px; }
  .upload-area { margin: 12px; border: 1px dashed var(--border); padding: 12px; text-align: center; cursor: pointer; position: relative; }
  .upload-area:hover { background: rgba(0,0,0,0.04); }
  .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-label { font-size: 12px; font-weight: bold; letter-spacing: 0.05em; }
  .upload-hint { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
  .shortcut { font-size: 10px; color: var(--text-muted); background: rgba(0,0,0,0.08); padding: 2px 5px; border-radius: 2px; }
  .controls { padding: 0 12px 12px; flex: 1; }
  .control-row { margin-top: 10px; }
  .control-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .control-label span { color: var(--text-muted); }
  input[type="range"] { width: 100%; height: 2px; -webkit-appearance: none; background: var(--border); outline: none; cursor: pointer; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--text); border-radius: 50%; cursor: pointer; }
  .section-title { font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin: 16px 0 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: pointer; user-select: none; }
  .collapsible { overflow: hidden; transition: max-height 0.2s ease; }
  .collapsible.collapsed { max-height: 0 !important; }
  .switcher { display: flex; gap: 4px; margin-top: 10px; align-items: center; }
  .switcher label { font-size: 11px; min-width: 80px; flex-shrink: 0; }
  .switcher-btns { display: flex; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .switcher-btns button { font-family: var(--font); font-size: 12px; padding: 3px 9px; background: transparent; border: none; cursor: pointer; color: var(--text-muted); }
  .switcher-btns button.active { background: var(--text); color: var(--bg); }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 11px; cursor: pointer; user-select: none; }
  .toggle-indicator { width: 10px; height: 10px; border: 1px solid var(--text); display: inline-flex; align-items: center; justify-content: center; font-size: 8px; }
  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .btn-export { font-family: var(--font); font-size: 12px; background: var(--text); color: var(--bg); border: none; padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-radius: 2px; width: 100%; }
  .btn-export:hover { opacity: 0.85; }
  .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  #canvas { display: block; image-rendering: pixelated; }
  .drop-hint { position: absolute; text-align: center; pointer-events: none; }
  .drop-hint p { font-size: 13px; color: var(--text-muted); }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }
  .color-palette { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
  .color-swatch.active { border-color: var(--text); }
  .color-row { margin-top: 10px; }
  .color-row > label { font-size: 11px; display: block; margin-bottom: 6px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <a href="#">/effects</a>
    <h1>[ dots ]</h1>
  </div>

  <div class="upload-area">
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    <div class="upload-label">Upload media <span class="shortcut">cmd + O</span></div>
    <div class="upload-hint">[.jpg, .png, .webp]</div>
  </div>

  <div class="controls">
    <div class="control-row">
      <div class="control-label">Canvas Size <span id="val-canvas-size">800</span></div>
      <input type="range" id="canvas-size" min="200" max="2000" step="50" value="800">
    </div>

    <div class="section-title" id="toggle-preprocess">Image Preprocessing <span class="toggle-icon">−</span></div>
    <div class="collapsible" id="section-preprocess" style="max-height:500px">
      <div class="control-row">
        <div class="control-label">Blur <span id="val-blur">0</span></div>
        <input type="range" id="blur" min="0" max="10" step="1" value="0">
      </div>
      <div class="control-row">
        <div class="control-label">Contrast <span id="val-contrast">1</span></div>
        <input type="range" id="contrast" min="0.5" max="3" step="0.1" value="1">
      </div>
      <div class="control-row">
        <div class="control-label">Brightness <span id="val-brightness">1</span></div>
        <input type="range" id="brightness" min="0.2" max="2" step="0.1" value="1">
      </div>
      <div class="control-row">
        <div class="control-label">Gamma <span id="val-gamma">1</span></div>
        <input type="range" id="gamma" min="0.1" max="3" step="0.1" value="1">
      </div>
    </div>

    <!-- Toggles -->
    <div class="toggle-row" id="toggle-effect">
      <div style="display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text-muted)">
        <span>[</span><span class="toggle-indicator" id="effect-indicator">✓</span><span>]</span>
      </div>
      <label>Show Effect</label>
    </div>
    <div class="toggle-row" id="toggle-invert">
      <div style="display:flex;align-items:center;gap:2px;font-size:11px;color:var(--text-muted)">
        <span>[</span><span class="toggle-indicator" id="invert-indicator">&nbsp;</span><span>]</span>
      </div>
      <label>Invert</label>
    </div>

    <!-- Dithering -->
    <div class="switcher">
      <label>Dithering</label>
      <div class="switcher-btns" id="dither-switcher">
        <button data-val="none">None</button>
        <button class="active" data-val="floyd">Floyd</button>
        <button data-val="ordered">Ordered</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Threshold <span id="val-threshold">128</span></div>
      <input type="range" id="threshold" min="0" max="255" step="1" value="128">
    </div>

    <!-- Shape -->
    <div class="switcher">
      <label>Shape</label>
      <div class="switcher-btns" id="shape-switcher">
        <button class="active" data-val="square" title="Square">■</button>
        <button data-val="circle" title="Circle">●</button>
        <button data-val="arrow" title="Arrow">◀</button>
        <button data-val="mix" title="Mix">✦</button>
      </div>
    </div>

    <div id="mix-pattern-row" class="switcher" style="display:none">
      <label>Pattern</label>
      <div class="switcher-btns" id="mix-pattern-switcher">
        <button class="active" data-val="ordered">Ordered</button>
        <button data-val="random">Random</button>
      </div>
    </div>

    <!-- Color -->
    <div class="switcher">
      <label>Color</label>
      <div class="switcher-btns" id="color-mode-switcher">
        <button class="active" data-val="mono">Mono</button>
        <button data-val="multi">Multi</button>
      </div>
    </div>

    <div id="palette-row" class="color-row" style="display:none">
      <label>Palette</label>
      <div class="color-palette" id="color-palette"></div>
    </div>

    <!-- Grid -->
    <div class="switcher">
      <label>Grid Type</label>
      <div class="switcher-btns" id="grid-type-switcher">
        <button class="active" data-val="regular">Regular</button>
        <button data-val="benday">Benday</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Shape Size <span id="val-shape-size">5</span></div>
      <input type="range" id="shape-size" min="1" max="30" step="1" value="5">
    </div>
    <div class="control-row">
      <div class="control-label">Step Size <span id="val-step-size">8</span></div>
      <input type="range" id="step-size" min="2" max="40" step="1" value="8">
    </div>
    <div class="control-row">
      <div class="control-label">Corner Radius <span id="val-corner-radius">1</span></div>
      <input type="range" id="corner-radius" min="0" max="20" step="1" value="1">
    </div>
    <div class="control-row">
      <div class="control-label">Grid Angle <span id="val-grid-angle">0</span></div>
      <input type="range" id="grid-angle" min="-45" max="45" step="1" value="0">
    </div>
    <div class="control-row">
      <div class="control-label">Noise <span id="val-noise">0</span></div>
      <input type="range" id="noise" min="0" max="10" step="1" value="0">
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="switcher" style="margin-top:0">
      <label style="font-size:11px">Format</label>
      <div class="switcher-btns" id="format-switcher">
        <button class="active" data-val="png">PNG</button>
        <button data-val="svg">SVG</button>
      </div>
    </div>
    <button class="btn-export" id="btn-export">Export canvas <span class="shortcut">cmd + S</span></button>
  </div>
</aside>

<main class="canvas-area" id="canvasArea">
  <div class="drop-hint" id="dropHint"><p>Upload an image to get started</p></div>
  <canvas id="canvas"></canvas>
</main>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

let sourceImg = null;
let showEffect = true;
let invertColors = false;
let gridType = 'regular';
let shapeType = 'square';
let mixPattern = 'ordered';
let colorMode = 'mono';
let ditherMode = 'floyd';
let outputFormat = 'png';
let renderTimeout = null;

// Reference palette (muted, like the inspiration)
const PALETTE_COLORS = [
  '#2e5fa3', '#c95f2a', '#2a6b3a', '#d4a0b0', '#7a3b2e', '#c8b040', '#6b4a8a'
];
let activeColors = [...PALETTE_COLORS];

const MIX_SHAPES = ['square', 'circle', 'arrow'];

function getShapeForCell(col, row) {
  if (shapeType !== 'mix') return shapeType;
  if (mixPattern === 'random') {
    const seed = ((col * 2654435761) ^ (row * 2246822519)) >>> 0;
    return MIX_SHAPES[seed % MIX_SHAPES.length];
  }
  return MIX_SHAPES[(col + row) % MIX_SHAPES.length];
}

function getColorForCell(col, row) {
  if (colorMode === 'mono') return '#1a1a1a';
  if (activeColors.length === 0) return '#1a1a1a';
  return activeColors[col % activeColors.length];
}

function buildPalette() {
  const container = document.getElementById('color-palette');
  container.innerHTML = '';
  PALETTE_COLORS.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch active';
    sw.style.background = color;
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      sw.classList.toggle('active');
      activeColors = [...container.querySelectorAll('.color-swatch.active')].map(s => s.dataset.color);
      if (activeColors.length === 0) { sw.classList.add('active'); activeColors = [color]; }
      scheduleRender();
    });
    container.appendChild(sw);
  });
}
buildPalette();

const state = {
  canvasSize: 800, blur: 0, contrast: 1, brightness: 1, gamma: 1,
  threshold: 128, shapeSize: 5, stepSize: 8, cornerRadius: 1,
  gridAngle: 0, noise: 0
};

[
  ['canvas-size','canvasSize'], ['blur','blur'], ['contrast','contrast'],
  ['brightness','brightness'], ['gamma','gamma'], ['threshold','threshold'],
  ['shape-size','shapeSize'], ['step-size','stepSize'],
  ['corner-radius','cornerRadius'], ['grid-angle','gridAngle'], ['noise','noise']
].forEach(([id, key]) => {
  const el = document.getElementById(id);
  const vl = document.getElementById('val-' + id);
  el.addEventListener('input', () => {
    state[key] = parseFloat(el.value);
    if (vl) vl.textContent = el.value;
    scheduleRender();
  });
});

document.getElementById('toggle-preprocess').addEventListener('click', function() {
  const sec = document.getElementById('section-preprocess');
  const icon = this.querySelector('.toggle-icon');
  sec.classList.toggle('collapsed');
  icon.textContent = sec.classList.contains('collapsed') ? '+' : '−';
  if (!sec.classList.contains('collapsed')) sec.style.maxHeight = '500px';
});

document.getElementById('toggle-effect').addEventListener('click', () => {
  showEffect = !showEffect;
  document.getElementById('effect-indicator').textContent = showEffect ? '✓' : ' ';
  scheduleRender();
});
document.getElementById('toggle-invert').addEventListener('click', () => {
  invertColors = !invertColors;
  document.getElementById('invert-indicator').textContent = invertColors ? '✓' : ' ';
  scheduleRender();
});

document.querySelectorAll('.switcher-btns').forEach(group => {
  group.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      group.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.val;
      if (group.id === 'dither-switcher') ditherMode = val;
      if (group.id === 'grid-type-switcher') gridType = val;
      if (group.id === 'format-switcher') outputFormat = val;
      if (group.id === 'shape-switcher') {
        shapeType = val;
        document.getElementById('mix-pattern-row').style.display = val === 'mix' ? 'flex' : 'none';
      }
      if (group.id === 'mix-pattern-switcher') mixPattern = val;
      if (group.id === 'color-mode-switcher') {
        colorMode = val;
        document.getElementById('palette-row').style.display = val === 'multi' ? 'block' : 'none';
      }
      scheduleRender();
    });
  });
});

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
['dragover','drop'].forEach(ev => {
  document.getElementById('canvasArea').addEventListener(ev, e => {
    e.preventDefault();
    if (ev === 'drop' && e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
});
function loadFile(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      sourceImg = img;
      document.getElementById('dropHint').style.display = 'none';
      scheduleRender();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'o') { e.preventDefault(); document.getElementById('fileInput').click(); }
  if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); doExport(); }
});

function scheduleRender() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(render, 60);
}

// ---- STEP 1: Prepare grayscale image at grid resolution ----
function prepareGrayscale(gridW, gridH) {
  // Draw image into offscreen at grid resolution
  offscreen.width = gridW;
  offscreen.height = gridH;
  offCtx.fillStyle = '#ffffff';
  offCtx.fillRect(0, 0, gridW, gridH);

  if (state.blur > 0) offCtx.filter = `blur(${state.blur}px)`;
  // Use CSS filters for contrast/brightness
  offCtx.filter = `blur(${state.blur}px) contrast(${state.contrast}) brightness(${state.brightness})`;
  const scale = Math.max(gridW / sourceImg.width, gridH / sourceImg.height);
  const sw = sourceImg.width * scale, sh = sourceImg.height * scale;
  offCtx.drawImage(sourceImg, (gridW - sw) / 2, (gridH - sh) / 2, sw, sh);
  offCtx.filter = 'none';

  const d = offCtx.getImageData(0, 0, gridW, gridH);
  const gray = new Float32Array(gridW * gridH);

  for (let i = 0; i < gray.length; i++) {
    const p = i * 4;
    let lum = d.data[p] * 0.299 + d.data[p+1] * 0.587 + d.data[p+2] * 0.114;
    // Gamma
    if (state.gamma !== 1) lum = 255 * Math.pow(lum / 255, state.gamma);
    if (invertColors) lum = 255 - lum;
    gray[i] = lum;
  }
  return { gray, w: gridW, h: gridH };
}

// ---- STEP 2: Dithering ----
function applyDithering(gray, w, h) {
  const out = new Uint8Array(w * h); // 0=black (draw shape), 255=white (skip)
  const buf = new Float32Array(gray); // copy

  if (ditherMode === 'none') {
    const t = state.threshold;
    for (let i = 0; i < buf.length; i++) out[i] = buf[i] < t ? 0 : 255;
    return out;
  }

  if (ditherMode === 'ordered') {
    // 4x4 Bayer matrix
    const bayer = [
       0, 128,  32, 160,
     192,  64, 224,  96,
      48, 176,  16, 144,
     240, 112, 208,  80
    ];
    const t = state.threshold;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const i = y * w + x;
        const b = bayer[(y % 4) * 4 + (x % 4)];
        out[i] = (buf[i] + b * 0.5 - 64) < t ? 0 : 255;
      }
    }
    return out;
  }

  // Floyd-Steinberg
  const t = state.threshold;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const old = buf[i];
      const nw = old < t ? 0 : 255;
      out[i] = nw;
      const err = old - nw;

      if (x + 1 < w)           buf[i + 1]     += err * 7 / 16;
      if (y + 1 < h) {
        if (x > 0)             buf[i + w - 1] += err * 3 / 16;
                               buf[i + w]     += err * 5 / 16;
        if (x + 1 < w)        buf[i + w + 1] += err * 1 / 16;
      }
    }
  }
  return out;
}

// ---- DRAW SHAPE ----
function drawShape(ctx, shape, cx, cy, r, cr) {
  switch (shape) {
    case 'circle':
      ctx.moveTo(cx + r, cy);
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      break;
    case 'square': {
      const rx = Math.min(cr, r);
      const x = cx - r, y = cy - r, w = r * 2;
      if (rx <= 0) { ctx.rect(x, y, w, w); break; }
      ctx.moveTo(x + rx, y);
      ctx.lineTo(x+w-rx, y); ctx.arcTo(x+w,y,x+w,y+rx,rx);
      ctx.lineTo(x+w,y+w-rx); ctx.arcTo(x+w,y+w,x+w-rx,y+w,rx);
      ctx.lineTo(x+rx,y+w); ctx.arcTo(x,y+w,x,y+w-rx,rx);
      ctx.lineTo(x,y+rx); ctx.arcTo(x,y,x+rx,y,rx);
      ctx.closePath();
      break;
    }
    case 'arrow': {
      ctx.moveTo(cx - r, cy);
      ctx.lineTo(cx + r * 0.6, cy - r * 0.9);
      ctx.lineTo(cx + r * 0.6, cy + r * 0.9);
      ctx.closePath();
      break;
    }
  }
}

// ---- MAIN RENDER ----
function render() {
  if (!sourceImg) return;

  const canvasSize = state.canvasSize;
  const step = state.stepSize;
  const shapeR = state.shapeSize;
  const cr = state.cornerRadius;
  const noise = state.noise;
  const angleRad = state.gridAngle * Math.PI / 180;

  canvas.width = canvasSize;
  canvas.height = canvasSize;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasSize, canvasSize);

  if (!showEffect) {
    // Show original image
    offscreen.width = canvasSize;
    offscreen.height = canvasSize;
    offCtx.fillStyle = '#fff';
    offCtx.fillRect(0, 0, canvasSize, canvasSize);
    const scale = Math.max(canvasSize / sourceImg.width, canvasSize / sourceImg.height);
    const sw = sourceImg.width * scale, sh = sourceImg.height * scale;
    offCtx.drawImage(sourceImg, (canvasSize-sw)/2, (canvasSize-sh)/2, sw, sh);
    ctx.drawImage(offscreen, 0, 0);
    return;
  }

  // Grid dimensions — sample at 1 cell per step
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const diag = Math.ceil(Math.sqrt(2) * canvasSize) + step * 4;
  const gridW = Math.ceil(diag / step) + 2;
  const gridH = Math.ceil(diag / step) + 2;
  const startX = cx - diag / 2;
  const startY = cy - diag / 2;

  // Prepare grayscale at grid resolution
  const { gray, w, h } = prepareGrayscale(gridW, gridH);
  const dithered = applyDithering(gray, w, h);

  // Render shapes
  if (colorMode === 'mono') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    for (let row = 0; row < gridH; row++) {
      for (let col = 0; col < gridW; col++) {
        if (dithered[row * gridW + col] !== 0) continue; // white = skip

        let lx = startX + col * step;
        let ly = startY + row * step;
        if (gridType === 'benday' && row % 2 === 1) lx += step / 2;

        const dx = lx - cx, dy = ly - cy;
        const drawX = cx + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const drawY = cy + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);

        const nx = noise > 0 ? drawX + (Math.random()-.5)*noise : drawX;
        const ny = noise > 0 ? drawY + (Math.random()-.5)*noise : drawY;

        drawShape(ctx, getShapeForCell(col, row), nx, ny, shapeR, cr);
      }
    }
    ctx.fill();
  } else {
    // Multi-color: group by color
    const byColor = {};
    for (let row = 0; row < gridH; row++) {
      for (let col = 0; col < gridW; col++) {
        if (dithered[row * gridW + col] !== 0) continue;
        let lx = startX + col * step;
        let ly = startY + row * step;
        if (gridType === 'benday' && row % 2 === 1) lx += step / 2;
        const dx = lx - cx, dy = ly - cy;
        const drawX = cx + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
        const drawY = cy + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
        const nx = noise > 0 ? drawX + (Math.random()-.5)*noise : drawX;
        const ny = noise > 0 ? drawY + (Math.random()-.5)*noise : drawY;
        const color = getColorForCell(col, row);
        if (!byColor[color]) byColor[color] = [];
        byColor[color].push({ nx, ny, shape: getShapeForCell(col, row) });
      }
    }
    Object.entries(byColor).forEach(([color, cells]) => {
      ctx.fillStyle = color;
      ctx.beginPath();
      cells.forEach(({ nx, ny, shape }) => drawShape(ctx, shape, nx, ny, shapeR, cr));
      ctx.fill();
    });
  }
}

// ---- EXPORT ----
document.getElementById('btn-export').addEventListener('click', doExport);
function doExport() {
  if (!sourceImg) return;
  if (outputFormat === 'png') {
    const link = document.createElement('a');
    link.download = 'halftone.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } else exportSVG();
}

function exportSVG() {
  // Re-run the same logic but output SVG
  const canvasSize = state.canvasSize;
  const step = state.stepSize;
  const shapeR = state.shapeSize;
  const cr = state.cornerRadius;
  const noise = state.noise;
  const angleRad = state.gridAngle * Math.PI / 180;
  const cx = canvasSize / 2, cy = canvasSize / 2;
  const diag = Math.ceil(Math.sqrt(2) * canvasSize) + step * 4;
  const gridW = Math.ceil(diag / step) + 2;
  const gridH = Math.ceil(diag / step) + 2;
  const startX = cx - diag / 2, startY = cy - diag / 2;

  const { gray, w, h } = prepareGrayscale(gridW, gridH);
  const dithered = applyDithering(gray, w, h);

  let shapes = '';
  for (let row = 0; row < gridH; row++) {
    for (let col = 0; col < gridW; col++) {
      if (dithered[row * gridW + col] !== 0) continue;
      let lx = startX + col * step;
      let ly = startY + row * step;
      if (gridType === 'benday' && row % 2 === 1) lx += step / 2;
      const dx = lx - cx, dy = ly - cy;
      const drawX = cx + dx * Math.cos(angleRad) - dy * Math.sin(angleRad);
      const drawY = cy + dx * Math.sin(angleRad) + dy * Math.cos(angleRad);
      const nx = noise > 0 ? drawX + (Math.random()-.5)*noise : drawX;
      const ny = noise > 0 ? drawY + (Math.random()-.5)*noise : drawY;
      const shape = getShapeForCell(col, row);
      const fill = colorMode === 'mono' ? '#1a1a1a' : getColorForCell(col, row);
      const r = shapeR;
      const rx = Math.min(cr, r);

      if (shape === 'circle') {
        shapes += `<circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="${r}" fill="${fill}"/>`;
      } else if (shape === 'square') {
        shapes += `<rect x="${(nx-r).toFixed(1)}" y="${(ny-r).toFixed(1)}" width="${r*2}" height="${r*2}" rx="${rx}" fill="${fill}"/>`;
      } else {
        shapes += `<polygon points="${(nx-r).toFixed(1)},${ny.toFixed(1)} ${(nx+r*.6).toFixed(1)},${(ny-r*.9).toFixed(1)} ${(nx+r*.6).toFixed(1)},${(ny+r*.9).toFixed(1)}" fill="${fill}"/>`;
      }
    }
  }

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvasSize}" height="${canvasSize}"><rect width="${canvasSize}" height="${canvasSize}" fill="white"/><g>${shapes}</g></svg>`;
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const link = document.createElement('a');
  link.download = 'halftone.svg';
  link.href = URL.createObjectURL(blob);
  link.click();
}
</script>
