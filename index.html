<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>GiocoGeometry</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede8; --panel: #e8e4de; --border: #ccc8c0;
    --text: #1a1a1a; --muted: #888;
    --font: 'Courier New', monospace;
    --panel-h: 340px;
  }
  html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* ---- CANVAS AREA ---- */
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: #d8d4ce;
    padding: 16px;
  }
  .canvas-outer {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }
  #canvas {
    display: block;
    /* scale to fit while keeping aspect ratio */
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    box-shadow: 0 2px 20px rgba(0,0,0,0.18);
  }
  .hint { position: absolute; font-size: 12px; color: var(--muted); text-align: center; pointer-events: none; }

  /* ---- BOTTOM PANEL ---- */
  .panel {
    background: var(--panel);
    border-top: 1px solid var(--border);
    height: var(--panel-h);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Drag handle */
  .handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px auto 4px;
    flex-shrink: 0;
    cursor: pointer;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 6px 4px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.1s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* Tab content */
  .tab-content { display: none; flex: 1; overflow-y: auto; padding: 10px 14px 20px; }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { display: none; }

  /* Controls */
  .row { margin-bottom: 12px; }
  .row-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
  .row-label span { color: var(--muted); }
  input[type="range"] {
    width: 100%; height: 28px; -webkit-appearance: none;
    background: transparent; outline: none; cursor: pointer;
    padding: 0;
  }
  input[type="range"]::-webkit-slider-runnable-track {
    height: 2px; background: var(--border); border-radius: 1px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px;
    background: var(--text); border-radius: 50%;
    margin-top: -8px; cursor: pointer;
  }

  /* Upload button */
  .upload-btn {
    width: 100%;
    font-family: var(--font);
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.05em;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 12px;
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 12px;
    position: relative;
  }
  .upload-btn input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  /* Slider + number combo */
  .row { margin-bottom: 10px; }
  .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .row-top label { font-size: 11px; color: var(--text); }
  .row-top input[type="number"] {
    font-family: var(--font);
    font-size: 11px;
    width: 52px;
    padding: 2px 5px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    border-radius: 2px;
    text-align: right;
    -moz-appearance: textfield;
  }
  .row-top input[type="number"]::-webkit-inner-spin-button,
  .row-top input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .row-top input[type="number"]:focus { outline: none; border-color: var(--text); }

  /* Toggles */
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; font-size: 12px; }
  .tog { width: 12px; height: 12px; border: 1.5px solid var(--text); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }

  /* Switchers */
  .sw-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .sw-label { font-size: 11px; min-width: 68px; flex-shrink: 0; }
  .sw-btns { display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .sw-btn { font-family: var(--font); font-size: 12px; padding: 5px 10px; background: transparent; border: none; cursor: pointer; color: var(--muted); white-space: nowrap; }
  .sw-btn.active { background: var(--text); color: var(--bg); }

  /* Color palette */
  .palette { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .swatch { width: 26px; height: 26px; border-radius: 4px; border: 2px solid transparent; cursor: pointer; }
  .swatch.active { border-color: var(--text); }

  /* Export */
  .export-btn {
    width: 100%;
    font-family: var(--font);
    font-size: 12px;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 12px;
    border-radius: 3px;
    cursor: pointer;
    margin-top: 4px;
  }

  /* Loading indicator */
  .spinner {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
  }
  .spinner.visible { display: block; }

  /* Desktop layout override */
  @media (min-width: 700px) {
    body { flex-direction: row; }
    .canvas-wrap { flex: 1; }
    .panel {
      width: 260px;
      height: 100%;
      border-top: none;
      border-left: 1px solid var(--border);
      --panel-h: 100%;
    }
    .handle { display: none; }
  }
</style>
</head>
<body>

<!-- CANVAS -->
<div class="canvas-wrap">
  <div class="canvas-outer"><canvas id="canvas"></canvas></div>
  <div class="hint" id="hint">Tap to upload an image</div>
  <div class="spinner" id="spinner">rendering…</div>
</div>

<!-- BOTTOM PANEL -->
<div class="panel" id="panel">
  <div class="handle" id="handle"></div>

  <div class="tabs">
    <button class="tab active" data-tab="upload">Upload</button>
    <button class="tab" data-tab="effect">Effect</button>
    <button class="tab" data-tab="shape">Shape</button>
    <button class="tab" data-tab="export">Export</button>
  </div>

  <!-- TAB: UPLOAD -->
  <div class="tab-content active" id="tab-upload">
    <button class="upload-btn">
      📁 Upload image
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    </button>
    <!-- Canvas dimensions -->
    <div style="font-size:11px;margin-bottom:6px;color:var(--muted)">Canvas Size</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px" id="sw-preset">
      <button class="sw-btn" data-w="1080" data-h="1080" onclick="applyPreset(this)">Instagram</button>
      <button class="sw-btn" data-w="1920" data-h="1080" onclick="applyPreset(this)">16:9</button>
      <button class="sw-btn" data-w="1080" data-h="1920" onclick="applyPreset(this)">Story</button>
      <button class="sw-btn" data-w="794"  data-h="1123" onclick="applyPreset(this)">A4</button>
      <button class="sw-btn" data-w="1200" data-h="628"  onclick="applyPreset(this)">Banner</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:flex-end">
      <div style="flex:1">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Width px</div>
        <input type="number" id="input-w" value="800" min="100" max="4000" step="10"
          style="width:100%;font-family:var(--font);font-size:12px;padding:7px 8px;border:1px solid var(--border);background:var(--bg);border-radius:3px;color:var(--text)">
      </div>
      <div style="font-size:16px;color:var(--muted);padding-bottom:8px">×</div>
      <div style="flex:1">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Height px</div>
        <input type="number" id="input-h" value="800" min="100" max="4000" step="10"
          style="width:100%;font-family:var(--font);font-size:12px;padding:7px 8px;border:1px solid var(--border);background:var(--bg);border-radius:3px;color:var(--text)">
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <label>Blur</label>
        <input type="number" id="num-blur" value="0" min="0" max="8" step="1">
      </div>
      <input type="range" id="blur" min="0" max="8" step="1" value="0">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Contrast</label>
        <input type="number" id="num-contrast" value="1" min="0.5" max="3" step="0.1">
      </div>
      <input type="range" id="contrast" min="0.5" max="3" step="0.1" value="1">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Brightness</label>
        <input type="number" id="num-brightness" value="1" min="0.2" max="2" step="0.1">
      </div>
      <input type="range" id="brightness" min="0.2" max="2" step="0.1" value="1">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Gamma</label>
        <input type="number" id="num-gamma" value="1" min="0.1" max="3" step="0.1">
      </div>
      <input type="range" id="gamma" min="0.1" max="3" step="0.1" value="1">
    </div>
    <div class="toggle-row" id="toggle-invert">
      <div class="tog" id="invert-ind">&nbsp;</div> Invert colors
    </div>
  </div>

  <!-- TAB: EFFECT -->
  <div class="tab-content" id="tab-effect">
    <div class="toggle-row" id="toggle-effect">
      <div class="tog" id="effect-ind">✓</div> Show Effect
    </div>
    <div class="sw-row">
      <span class="sw-label">Dithering</span>
      <div class="sw-btns" id="sw-dither">
        <button class="sw-btn" data-val="none">None</button>
        <button class="sw-btn active" data-val="floyd">Floyd</button>
        <button class="sw-btn" data-val="ordered">Bayer</button>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <label>Threshold</label>
        <input type="number" id="num-threshold" value="128" min="0" max="255" step="1">
      </div>
      <input type="range" id="threshold" min="0" max="255" step="1" value="128">
    </div>
    <div class="sw-row">
      <span class="sw-label">Grid Type</span>
      <div class="sw-btns" id="sw-grid">
        <button class="sw-btn active" data-val="regular">Regular</button>
        <button class="sw-btn" data-val="benday">Benday</button>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <label>Step Size</label>
        <input type="number" id="num-step-size" value="8" min="2" max="40" step="1">
      </div>
      <input type="range" id="step-size" min="2" max="40" step="1" value="8">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Grid Angle</label>
        <input type="number" id="num-grid-angle" value="0" min="-45" max="45" step="1">
      </div>
      <input type="range" id="grid-angle" min="-45" max="45" step="1" value="0">
    </div>
  </div>

  <!-- TAB: SHAPE -->
  <div class="tab-content" id="tab-shape">
    <div class="sw-row">
      <span class="sw-label">Shape</span>
      <div class="sw-btns" id="sw-shape">
        <button class="sw-btn active" data-val="square">■</button>
        <button class="sw-btn" data-val="circle">●</button>
        <button class="sw-btn" data-val="arrow">◀</button>
        <button class="sw-btn" data-val="mix">✦</button>
      </div>
    </div>
    <div class="sw-row" id="mix-row" style="display:none">
      <span class="sw-label">Pattern</span>
      <div class="sw-btns" id="sw-mix">
        <button class="sw-btn active" data-val="ordered">Ordered</button>
        <button class="sw-btn" data-val="random">Random</button>
      </div>
    </div>
    <div class="row">
      <div class="row-top">
        <label>Shape Size</label>
        <input type="number" id="num-shape-size" value="5" min="1" max="30" step="1">
      </div>
      <input type="range" id="shape-size" min="1" max="30" step="1" value="5">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Corner Radius</label>
        <input type="number" id="num-corner-radius" value="1" min="0" max="20" step="1">
      </div>
      <input type="range" id="corner-radius" min="0" max="20" step="1" value="1">
    </div>
    <div class="row">
      <div class="row-top">
        <label>Noise</label>
        <input type="number" id="num-noise" value="0" min="0" max="10" step="1">
      </div>
      <input type="range" id="noise" min="0" max="10" step="1" value="0">
    </div>
    <div class="sw-row">
      <span class="sw-label">Color</span>
      <div class="sw-btns" id="sw-color">
        <button class="sw-btn active" data-val="mono">Mono</button>
        <button class="sw-btn" data-val="multi">Multi</button>
      </div>
    </div>
    <div id="palette-wrap" style="display:none">
      <div style="font-size:11px;margin-bottom:6px">Palette</div>
      <div class="palette" id="palette"></div>
    </div>
  </div>

  <!-- TAB: EXPORT -->
  <div class="tab-content" id="tab-export">
    <div class="sw-row">
      <span class="sw-label">Format</span>
      <div class="sw-btns" id="sw-format">
        <button class="sw-btn active" data-val="png">PNG</button>
        <button class="sw-btn" data-val="svg">SVG</button>
      </div>
    </div>
    <button class="export-btn" id="btn-export">Export canvas</button>
  </div>
</div>

<script>
// ---- STATE ----
const S = {
  canvasW: 800, canvasH: 800, blur: 0, contrast: 1, brightness: 1, gamma: 1,
  threshold: 128, stepSize: 8, shapeSize: 5, cornerRadius: 1,
  gridAngle: 0, noise: 0,
  dither: 'floyd', grid: 'regular', shape: 'square',
  mix: 'ordered', color: 'mono', format: 'png',
  showEffect: true, invert: false
};

const PALETTE = ['#2e5fa3','#c95f2a','#2a6b3a','#d4a0b0','#7a3b2e','#c8b040','#6b4a8a'];
let activeColors = [...PALETTE];
let sourceImg = null;
let renderJob = null;
let lastRenderTime = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const off = document.createElement('canvas');
const offCtx = off.getContext('2d', { willReadFrequently: true });
const spinner = document.getElementById('spinner');

// ---- SLIDERS ----
[
  ['blur','blur'],['contrast','contrast'],
  ['brightness','brightness'],['gamma','gamma'],['threshold','threshold'],
  ['step-size','stepSize'],['shape-size','shapeSize'],
  ['corner-radius','cornerRadius'],['grid-angle','gridAngle'],['noise','noise']
].forEach(([id, key]) => {
  const slider = document.getElementById(id);
  const numIn  = document.getElementById('num-'+id);
  function update(val) {
    val = Math.min(parseFloat(slider.max), Math.max(parseFloat(slider.min), parseFloat(val)||0));
    S[key] = val;
    slider.value = val;
    if (numIn) numIn.value = val;
    scheduleRender();
  }
  slider.addEventListener('input', () => update(slider.value));
  if (numIn) {
    numIn.addEventListener('change', () => update(numIn.value));
    numIn.addEventListener('keydown', e => { if (e.key==='Enter') update(numIn.value); });
  }
});

// ---- TABS ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

// ---- PANEL DRAG (mobile) ----
const panel = document.getElementById('panel');
let panelOpen = true;
let dragStart = null, panelStartH = null;
const PANEL_MIN = 52, PANEL_MAX = window.innerHeight * 0.85;

document.getElementById('handle').addEventListener('touchstart', e => {
  dragStart = e.touches[0].clientY;
  panelStartH = panel.offsetHeight;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (dragStart === null) return;
  const dy = dragStart - e.touches[0].clientY;
  const newH = Math.min(PANEL_MAX, Math.max(PANEL_MIN, panelStartH + dy));
  panel.style.height = newH + 'px';
}, { passive: true });
document.addEventListener('touchend', () => { dragStart = null; });

// ---- SWITCHERS ----
function makeSwitcher(id, key, extra) {
  document.getElementById(id).querySelectorAll('.sw-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById(id).querySelectorAll('.sw-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      S[key] = btn.dataset.val;
      if (extra) extra(btn.dataset.val);
      scheduleRender();
    });
  });
}
makeSwitcher('sw-dither', 'dither');
makeSwitcher('sw-grid', 'grid');
makeSwitcher('sw-format', 'format');
makeSwitcher('sw-shape', 'shape', val => {
  document.getElementById('mix-row').style.display = val === 'mix' ? 'flex' : 'none';
});
makeSwitcher('sw-mix', 'mix');
makeSwitcher('sw-color', 'color', val => {
  document.getElementById('palette-wrap').style.display = val === 'multi' ? 'block' : 'none';
});

// ---- TOGGLES ----
document.getElementById('toggle-effect').addEventListener('click', () => {
  S.showEffect = !S.showEffect;
  document.getElementById('effect-ind').textContent = S.showEffect ? '✓' : ' ';
  scheduleRender();
});
document.getElementById('toggle-invert').addEventListener('click', () => {
  S.invert = !S.invert;
  document.getElementById('invert-ind').textContent = S.invert ? '✓' : ' ';
  scheduleRender();
});

// ---- PALETTE ----
function buildPalette() {
  const c = document.getElementById('palette');
  PALETTE.forEach(color => {
    const sw = document.createElement('div');
    sw.className = 'swatch active';
    sw.style.background = color;
    sw.dataset.color = color;
    sw.addEventListener('click', () => {
      sw.classList.toggle('active');
      activeColors = [...c.querySelectorAll('.swatch.active')].map(s => s.dataset.color);
      if (!activeColors.length) { sw.classList.add('active'); activeColors = [color]; }
      scheduleRender();
    });
    c.appendChild(sw);
  });
}
buildPalette();

// ---- FILE INPUT ----
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});
document.querySelector('.canvas-wrap').addEventListener('click', () => {
  if (!sourceImg) document.getElementById('fileInput').click();
});
['dragover','drop'].forEach(ev => {
  document.querySelector('.canvas-wrap').addEventListener(ev, e => {
    e.preventDefault();
    if (ev === 'drop' && e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
});
function loadFile(file) {
  const r = new FileReader();
  r.onload = ev => {
    const img = new Image();
    img.onload = () => {
      sourceImg = img;
      document.getElementById('hint').style.display = 'none';
      scheduleRender();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(file);
}

// ---- KEYBOARD ----
document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key === 'o') { e.preventDefault(); document.getElementById('fileInput').click(); }
  if (mod && e.key === 's') { e.preventDefault(); doExport(); }
});

// ---- RENDER SCHEDULING (throttled) ----
let isDragging = false;
document.addEventListener('mousedown', e => { if(e.target.type==='range') isDragging=true; });
document.addEventListener('mouseup', () => {
  if (isDragging) { isDragging=false; scheduleRender(); }
});
document.addEventListener('touchend', () => {
  if (isDragging) { isDragging=false; scheduleRender(); }
});

function scheduleRender() {
  clearTimeout(renderJob);
  // While dragging: preview at low res every 200ms, full render on release
  const delay = isDragging ? 200 : 60;
  renderJob = setTimeout(isDragging ? doPreview : doRender, delay);
}

function doPreview() {
  // Fast preview: render at reduced resolution while dragging
  if (!sourceImg) return;
  const origW = S.canvasW, origH = S.canvasH, origStep = S.stepSize;
  // Scale down to max 400px equivalent for preview
  const previewScale = Math.min(1, 400 / Math.max(origW, origH));
  S.canvasW = Math.round(origW * previewScale);
  S.canvasH = Math.round(origH * previewScale);
  S.stepSize = Math.max(2, Math.round(origStep * previewScale));
  doRender();
  S.canvasW = origW;
  S.canvasH = origH;
  S.stepSize = origStep;
}

// ---- GRAYSCALE PREPARE ----
function prepareGray(gw, gh) {
  off.width = gw; off.height = gh;
  offCtx.fillStyle = '#fff';
  offCtx.fillRect(0, 0, gw, gh);
  offCtx.filter = `blur(${S.blur}px) contrast(${S.contrast}) brightness(${S.brightness})`;
  // Contain: fit image inside canvas, letterbox with white
  const scX = gw / sourceImg.width, scY = gh / sourceImg.height;
  const sc = Math.min(scX, scY);
  const sw = sourceImg.width * sc, sh = sourceImg.height * sc;
  const ox = (gw - sw) / 2, oy = (gh - sh) / 2;
  offCtx.drawImage(sourceImg, ox, oy, sw, sh);
  offCtx.filter = 'none';

  const d = offCtx.getImageData(0, 0, gw, gh).data;
  const gray = new Float32Array(gw * gh);
  for (let i = 0; i < gray.length; i++) {
    const p = i*4;
    let l = d[p]*.299 + d[p+1]*.587 + d[p+2]*.114;
    if (S.gamma !== 1) l = 255 * Math.pow(l/255, S.gamma);
    gray[i] = S.invert ? 255-l : l;
  }
  return gray;
}

// ---- DITHERING ----
function dither(gray, gw, gh) {
  const out = new Uint8Array(gw * gh);
  const buf = new Float32Array(gray);
  const t = S.threshold;

  if (S.dither === 'none') {
    for (let i = 0; i < buf.length; i++) out[i] = buf[i] < t ? 1 : 0;
    return out;
  }
  if (S.dither === 'ordered') {
    const bayer = [0,128,32,160,192,64,224,96,48,176,16,144,240,112,208,80];
    for (let y = 0; y < gh; y++)
      for (let x = 0; x < gw; x++) {
        const i = y*gw+x;
        out[i] = (buf[i] + bayer[(y%4)*4+(x%4)]*.5-64) < t ? 1 : 0;
      }
    return out;
  }
  // Floyd-Steinberg
  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const i = y*gw+x;
      const nw = buf[i] < t ? 0 : 255;
      out[i] = nw === 0 ? 1 : 0;
      const err = buf[i] - nw;
      if (x+1 < gw)              buf[i+1]    += err*7/16;
      if (y+1 < gh) {
        if (x > 0)               buf[i+gw-1] += err*3/16;
                                  buf[i+gw]   += err*5/16;
        if (x+1 < gw)            buf[i+gw+1] += err/16;
      }
    }
  }
  return out;
}

// ---- SHAPE ----
const MIX = ['square','circle','arrow'];
function shapeFor(col, row) {
  if (S.shape !== 'mix') return S.shape;
  if (S.mix === 'random') {
    const s = ((col*2654435761)^(row*2246822519))>>>0;
    return MIX[s%3];
  }
  return MIX[(col+row)%3];
}
function colorFor(col) {
  if (S.color === 'mono' || !activeColors.length) return '#1a1a1a';
  return activeColors[col % activeColors.length];
}

function drawShape(ctx, shape, cx, cy, r, cr) {
  switch(shape) {
    case 'circle':
      ctx.moveTo(cx+r,cy); ctx.arc(cx,cy,r,0,Math.PI*2); break;
    case 'square': {
      const rx = Math.min(cr,r), x=cx-r, y=cy-r, w=r*2;
      if (!rx) { ctx.rect(x,y,w,w); break; }
      ctx.moveTo(x+rx,y);
      ctx.lineTo(x+w-rx,y); ctx.arcTo(x+w,y,x+w,y+rx,rx);
      ctx.lineTo(x+w,y+w-rx); ctx.arcTo(x+w,y+w,x+w-rx,y+w,rx);
      ctx.lineTo(x+rx,y+w); ctx.arcTo(x,y+w,x,y+w-rx,rx);
      ctx.lineTo(x,y+rx); ctx.arcTo(x,y,x+rx,y,rx);
      ctx.closePath(); break;
    }
    case 'arrow':
      ctx.moveTo(cx-r,cy);
      ctx.lineTo(cx+r*.6,cy-r*.9);
      ctx.lineTo(cx+r*.6,cy+r*.9);
      ctx.closePath(); break;
  }
}

// ---- COLLECT CELLS (shared between render & SVG export) ----
function collectCells(mask, gw, gh, cw, ch) {
  const size = Math.max(cw,ch);
  const step = S.stepSize, angleRad = S.gridAngle * Math.PI/180;
  // step here matches gw/gh so grid aligns
  const cx = cw/2, cy = ch/2;
  const diag = Math.ceil(Math.sqrt(2)*size) + step*4;
  const startX = cx - diag/2, startY = cy - diag/2;
  const cols = Math.ceil(diag/step)+1, rows = Math.ceil(diag/step)+1;
  const cells = [];

  for (let row = 0; row <= rows; row++) {
    for (let col = 0; col <= cols; col++) {
      // Map draw grid cell → sample grid cell
      const gc = Math.round((col/cols) * (gw-1));
      const gr = Math.round((row/rows) * (gh-1));
      if (!mask[gr*gw+gc]) continue;

      let lx = startX + col*step;
      let ly = startY + row*step;
      if (S.grid === 'benday' && row%2===1) lx += step/2;
      const dx=lx-cx, dy=ly-cy;
      const a=angleRad;
      const drawX = cx + dx*Math.cos(a) - dy*Math.sin(a);
      const drawY = cy + dx*Math.sin(a) + dy*Math.cos(a);
      const n = S.noise;
      cells.push({
        col, row,
        x: n ? drawX+(Math.random()-.5)*n : drawX,
        y: n ? drawY+(Math.random()-.5)*n : drawY,
        shape: shapeFor(col,row),
        color: colorFor(col)
      });
    }
  }
  return cells;
}


// ---- CANVAS DIMENSIONS ----
function applyPreset(btn) {
  document.querySelectorAll('#sw-preset .sw-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.canvasW = parseInt(btn.dataset.w);
  S.canvasH = parseInt(btn.dataset.h);
  document.getElementById('input-w').value = S.canvasW;
  document.getElementById('input-h').value = S.canvasH;
  scheduleRender();
}
document.getElementById('input-w').addEventListener('change', e => {
  S.canvasW = Math.max(100, Math.min(4000, parseInt(e.target.value)||800));
  e.target.value = S.canvasW;
  document.querySelectorAll('#sw-preset .sw-btn').forEach(b => b.classList.remove('active'));
  scheduleRender();
});
document.getElementById('input-h').addEventListener('change', e => {
  S.canvasH = Math.max(100, Math.min(4000, parseInt(e.target.value)||800));
  e.target.value = S.canvasH;
  document.querySelectorAll('#sw-preset .sw-btn').forEach(b => b.classList.remove('active'));
  scheduleRender();
});

// ---- MAIN RENDER ----
let currentRenderID = 0;

function yieldFrame() {
  return new Promise(resolve => setTimeout(resolve, 0));
}

function getSafeStep(cw, ch, step) {
  const size = Math.max(cw, ch);
  const diag = Math.ceil(Math.sqrt(2) * size) + step * 4;
  const MAX_CELLS = 60000;
  let s = step;
  while (true) {
    const gw = Math.ceil(diag / s) + 2;
    const gh = Math.ceil(diag / s) + 2;
    if (gw * gh <= MAX_CELLS) break;
    s++;
  }
  if (s !== step) {
    S.stepSize = s;
    const sl = document.getElementById('step-size');
    const ni = document.getElementById('num-step-size');
    if (sl) sl.value = s;
    if (ni) ni.value = s;
  }
  const diag2 = Math.ceil(Math.sqrt(2) * size) + s * 4;
  return { gw: Math.ceil(diag2/s)+2, gh: Math.ceil(diag2/s)+2, step: s };
}

async function doRender() {
  if (!sourceImg) return;
  const myID = ++currentRenderID;
  spinner.classList.add('visible');

  await yieldFrame();
  if (myID !== currentRenderID) return;

  const { gw, gh } = getSafeStep(S.canvasW, S.canvasH, S.stepSize);

  canvas.width = S.canvasW;
  canvas.height = S.canvasH;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, S.canvasW, S.canvasH);

  if (!S.showEffect) {
    off.width = S.canvasW; off.height = S.canvasH;
    offCtx.fillStyle = '#fff';
    offCtx.fillRect(0, 0, S.canvasW, S.canvasH);
    const sc = Math.min(S.canvasW / sourceImg.width, S.canvasH / sourceImg.height);
    const sw = sourceImg.width * sc, sh = sourceImg.height * sc;
    offCtx.drawImage(sourceImg, (S.canvasW-sw)/2, (S.canvasH-sh)/2, sw, sh);
    ctx.drawImage(off, 0, 0);
    spinner.classList.remove('visible');
    return;
  }

  const gray = prepareGray(gw, gh);
  await yieldFrame(); if (myID !== currentRenderID) return;

  const mask = dither(gray, gw, gh);
  await yieldFrame(); if (myID !== currentRenderID) return;

  const cells = collectCells(mask, gw, gh, S.canvasW, S.canvasH);
  await yieldFrame(); if (myID !== currentRenderID) return;

  const r = S.shapeSize, cr = S.cornerRadius;
  const CHUNK = 1500;

  if (S.color === 'mono') {
    for (let i = 0; i < cells.length; i += CHUNK) {
      if (myID !== currentRenderID) return;
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      const end = Math.min(i + CHUNK, cells.length);
      for (let j = i; j < end; j++) {
        const c = cells[j];
        drawShape(ctx, c.shape, c.x, c.y, r, cr);
      }
      ctx.fill();
      await yieldFrame();
    }
  } else {
    const byColor = {};
    cells.forEach(c => { (byColor[c.color] = byColor[c.color] || []).push(c); });
    for (const [col, group] of Object.entries(byColor)) {
      if (myID !== currentRenderID) return;
      ctx.fillStyle = col;
      ctx.beginPath();
      group.forEach(c => drawShape(ctx, c.shape, c.x, c.y, r, cr));
      ctx.fill();
      await yieldFrame();
    }
  }

  if (myID === currentRenderID) spinner.classList.remove('visible');
}

// ---- EXPORT ----
document.getElementById('btn-export').addEventListener('click', doExport);
function doExport() {
  if (!sourceImg) return;
  if (S.format === 'png') {
    const a = document.createElement('a');
    a.download = 'halftone.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } else {
    const size = Math.max(S.canvasW,S.canvasH), step = S.stepSize;
    const diag = Math.ceil(Math.sqrt(2)*size)+step*4;
    const gw = Math.ceil(diag/step)+2, gh = Math.ceil(diag/step)+2;
    const gray = prepareGray(gw,gh);
    const mask = dither(gray,gw,gh);
    const cells = collectCells(mask,gw,gh,S.canvasW,S.canvasH);
    const r = S.shapeSize, cr = S.cornerRadius;
    let s = '';
    cells.forEach(({shape,x,y,color}) => {
      const fill = S.color==='mono'?'#1a1a1a':color;
      const rx=Math.min(cr,r);
      if (shape==='circle') s+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${fill}"/>`;
      else if (shape==='square') s+=`<rect x="${(x-r).toFixed(1)}" y="${(y-r).toFixed(1)}" width="${r*2}" height="${r*2}" rx="${rx}" fill="${fill}"/>`;
      else s+=`<polygon points="${(x-r).toFixed(1)},${y.toFixed(1)} ${(x+r*.6).toFixed(1)},${(y-r*.9).toFixed(1)} ${(x+r*.6).toFixed(1)},${(y+r*.9).toFixed(1)}" fill="${fill}"/>`;
    });
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${S.canvasW}" height="${S.canvasH}"><rect width="${S.canvasW}" height="${S.canvasH}" fill="white"/><g>${s}</g></svg>`;
    const a=document.createElement('a');
    a.download='halftone.svg';
    a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
    a.click();
  }
}
</script>
